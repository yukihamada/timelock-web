server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 静的サイト。サーバーは平文も鍵も一切扱わない（全処理はブラウザ内）。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # セキュリティヘッダ（CSP: drand公開リレーへの接続のみ許可）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src https://api.drand.sh https://api2.drand.sh https://api3.drand.sh https://drand.cloudflare.com; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;

    location = /bundle.js { add_header Cache-Control "public, max-age=86400"; }

    # 埋め込みブリッジだけは他プロダクトから iframe 可能にする（暗号処理はクライアント側、秘密は通らない）
    location = /embed.html {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src https://api.drand.sh https://api2.drand.sh https://api3.drand.sh https://drand.cloudflare.com; frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    gzip on;
    gzip_types text/html application/javascript text/css;
}
